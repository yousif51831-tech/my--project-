<!DOCTYPE html>
<html>
<head>
  <title>My Movies</title>

  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    h1 {
      text-align: center;
      color: red;
      padding: 20px;
    }

    .movies {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .movie {
      background-color: #222;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .movie:hover {
      transform: scale(1.1);
    }

    .movie img {
      width: 200px;
      border-radius: 10px;
    }

    button {
      background-color: red;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h1> My Movie Site</h1>

  <div class="movies">

    <div class="movie">
      <img src="https://via.placeholder.com/200">
      <h3>Movie 1</h3>
      <button>Watch Now</button>
    </div>

    <div class="movie">
      <img src="https://via.placeholder.com/200">
      <h3>Movie 2</h3>
      <button>Watch Now</button>
    </div>

    <div class="movie">
      <img src="https://via.placeholder.com/200">
      <h3>Movie 3</h3>
      <button>Watch Now</button>
    </div>

  </div>

</body>
</html>
